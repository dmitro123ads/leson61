<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="theme">
        <form action="">
            <div class="container">
                <div class="theme-section">
                    <h1 class="title">Налаштування аккаунту</h1>
                    <h3 class="sub-title-1">ТЕМА ІНТЕРФЕЙСУ</h3>

                    <div class="theme-buttons">
                        <label class="theme-option on">
                            <input type="radio" name="theme" checked>
                            <span class="radio"></span>
                            <span class="light">Світла</span>
                        </label>

                        <label class="theme-option">
                            <input type="radio" name="theme">
                            <span class="radio"></span>
                            <span class="dark">Темна</span>
                        </label>
                    </div>
                </div>
                <section class="emeil">
                    <h2>EMEIL СПОВІЩЕННЯ</h2>
                    <div class="check_container">
                        <h3 class="check_title">нові повідомлення в чаті</h3>
                        <input type="checkbox" name="" id="">
                        <span class="emeil_check_front"></span>
                        <span class="emeil_check_back"></span>
                    </div>
                    <div class="check_container">
                        <h3 class="check_title">щотижневий звіт успішності</h3>
                        <input type="checkbox" name="" id="">
                        <span class="emeil_check_front"></span>
                        <span class="emeil_check_back"></span>
                    </div>
                </section>
            </div>
            <div class="butn">
                <button type="submit">зберегти налаштування</button>
            </div>
        </form>
    </main>
</body>

</html>
